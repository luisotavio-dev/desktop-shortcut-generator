name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      created: ${{ steps.meta.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: meta
        shell: bash
        run: |
          VERSION="$(grep '^APP_VERSION' desktop_shortcut_generator/config/settings.py | sed -E 's/.*"([^"]+)".*/\1/')"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists. Bump APP_VERSION to publish a new release."
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.meta.outputs.created == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

  build-linux:
    name: Build Linux binary
    needs: prepare-release
    if: needs.prepare-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gettext \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release archive
        shell: bash
        run: |
          chmod +x scripts/build_linux_release.sh
          ./scripts/build_linux_release.sh

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: desktop-shortcut-generator-*-linux-x86_64.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: [prepare-release, build-linux]
    if: needs.prepare-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux release artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release

      - name: Publish release with Linux binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.version }}
          generate_release_notes: true
          draft: false
          files: desktop-shortcut-generator-*-linux-x86_64.tar.gz
